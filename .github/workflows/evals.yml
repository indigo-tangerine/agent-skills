---
name: Skill Evals

on:
  pull_request:
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/**/evals.json'
      - 'scripts/run-evals.js'
  workflow_dispatch:
    inputs:
      skill:
        description: 'Run evals for a single skill (leave blank for all)'
        required: false
        default: ''

jobs:
  evals:
    name: LLM behavioral evals
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_MODEL: claude-haiku-4-5-20251001
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          SKILL="${{ github.event.inputs.skill }}"
          if [ -n "$SKILL" ]; then
            node scripts/run-evals.js "$SKILL"
          else
            node scripts/run-evals.js
          fi
